services:
  mongo:
    image: mongo:6
    container_name: snaplink-mongo
    restart: unless-stopped

    expose:
      - "27017"

    volumes:
      - snaplink-mongo-data:/data/db

    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - snaplink-network

  redis:
    image: redis:7-alpine
    container_name: snaplink-redis
    restart: unless-stopped

    expose:
      - "6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

    networks:
      - snaplink-network

  backend:
    image: ghcr.io/anwarbuilds1/snaplink-backend:latest

    container_name: snaplink-backend

    restart: unless-stopped

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    env_file:
      - ./backend/.env

    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/url-shortener
      REDIS_URL: redis://redis:6379
      BASE_URL: https://snaplink.anwarbuilds.com

    ports:
      - "127.0.0.1:5000:5000"

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "--quiet",
          "http://localhost:5000/system/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    networks:
      - snaplink-network

  frontend:
    image: ghcr.io/anwarbuilds1/snaplink-frontend:latest

    container_name: snaplink-frontend

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "127.0.0.1:5173:80"

    networks:
      - snaplink-network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: snaplink-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - snaplink-prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - snaplink-network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: snaplink-nginx-exporter
    restart: unless-stopped
    command:
      - -nginx.scrape-uri=http://frontend:80/nginx_status
    expose:
      - "9113"
    depends_on:
      frontend:
        condition: service_started
    networks:
      - snaplink-network

  grafana:
    image: grafana/grafana:10.4.1
    container_name: snaplink-grafana
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - snaplink-grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    expose:
      - "3000"
    depends_on:
      - prometheus
    networks:
      - snaplink-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: snaplink-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"
    networks:
      - snaplink-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: snaplink-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - snaplink-network

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    container_name: snaplink-mongodb-exporter
    restart: unless-stopped
    command:
      - --mongodb.uri=mongodb://mongo:27017/url-shortener
    expose:
      - "9216"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - snaplink-network

volumes:
  snaplink-mongo-data:
  snaplink-prometheus-data:
  snaplink-grafana-data:

networks:
  snaplink-network:
    driver: bridge
