services:
  mongo:
    image: mongo:6
    container_name: snaplink-mongo-dev
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - snaplink-mongo-data:/data/db

    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - snaplink-network

  redis:
    image: redis:7-alpine
    container_name: snaplink-redis-dev
    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

    networks:
      - snaplink-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev

    container_name: snaplink-backend-dev

    restart: unless-stopped

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    env_file:
      - ./backend/.env

    environment:
      MONGODB_URI: mongodb://mongo:27017/url-shortener
      REDIS_URL: redis://redis:6379

    ports:
      - "5000:5000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    command: npm run dev

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "--quiet",
          "http://localhost:5000/system/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    networks:
      - snaplink-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev

    container_name: snaplink-frontend-dev

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    environment:
      VITE_API_URL: http://localhost:5000/api/v1
      VITE_SHORT_BASE_URL: http://localhost:5000

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    command: npm run dev -- --host 0.0.0.0

    networks:
      - snaplink-network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: snaplink-prometheus-dev
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml
      - snaplink-prometheus-data-dev:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - snaplink-network

  grafana:
    image: grafana/grafana:10.4.1
    container_name: snaplink-grafana-dev
    restart: unless-stopped
    volumes:
      - snaplink-grafana-data-dev:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - snaplink-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: snaplink-cadvisor-dev
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"
    networks:
      - snaplink-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: snaplink-redis-exporter-dev
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - snaplink-network

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    container_name: snaplink-mongodb-exporter-dev
    restart: unless-stopped
    command:
      - --mongodb.uri=mongodb://mongo:27017/url-shortener
    expose:
      - "9216"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - snaplink-network

volumes:
  snaplink-mongo-data:
  snaplink-prometheus-data-dev:
  snaplink-grafana-data-dev:

networks:
  snaplink-network:
    driver: bridge
