services:
  mongo:
    image: mongo:6
    container_name: snaplink-mongo-dev
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - snaplink-mongo-data:/data/db

    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - snaplink-network

  redis:
    image: redis:7-alpine
    container_name: snaplink-redis-dev
    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

    networks:
      - snaplink-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev

    container_name: snaplink-backend-dev

    restart: unless-stopped

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    env_file:
      - ./backend/.env

    environment:
      MONGODB_URI: mongodb://mongo:27017/url-shortener
      REDIS_URL: redis://redis:6379

    ports:
      - "5000:5000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    command: npm run dev

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "--quiet",
          "http://localhost:5000/system/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    networks:
      - snaplink-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev

    container_name: snaplink-frontend-dev

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    environment:
      VITE_API_URL: http://localhost:5000/api/v1

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    command: npm run dev -- --host 0.0.0.0

    networks:
      - snaplink-network

volumes:
  snaplink-mongo-data:

networks:
  snaplink-network:
    driver: bridge
